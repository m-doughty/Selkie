name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

env:
  TERM: xterm
  COLORTERM: truecolor
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Notcurses::Native builds notcurses from source during install. It
      # needs cmake, pkg-config, ncurses headers, deflate, unistring, and
      # ffmpeg. See Notcurses-Native/.github/workflows/test.yml for the
      # canonical list.
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests
        run: prove6 -I. t

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            ffmpeg \
            ncurses \
            libunistring \
            libdeflate

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests
        run: prove6 -I. t

  # Windows CI is disabled — Selkie depends on Notcurses::Native, which
  # cannot currently build on Windows: notcurses 3.0.16 has unguarded
  # struct termios references in termdesc.c that fail with current MSYS2
  # GCC. Re-enable once upstream patches Windows support.
