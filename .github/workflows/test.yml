name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

env:
  TERM: xterm
  COLORTERM: truecolor
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Notcurses::Native builds notcurses from source during install. It
      # needs cmake, pkg-config, ncurses headers, deflate, unistring, and
      # ffmpeg. See Notcurses-Native/.github/workflows/test.yml for the
      # canonical list.
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            libavformat-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavutil-dev \
            libswscale-dev

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests
        run: prove6 -I. t

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            ffmpeg \
            ncurses \
            libunistring \
            libdeflate

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      - name: Install Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      - name: Install App::Prove6
        run: zef install --/test App::Prove6

      - name: Run tests
        run: prove6 -I. t

  test-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    steps:
      - uses: actions/checkout@v6

      # Rakudo first so msys2 (below) can inherit PATH including raku/zef.
      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # MSYS2 UCRT64 — native Windows DLLs via mingw-w64 GCC. Upstream
      # notcurses only supports Windows through this toolchain. We use
      # ffmpeg for multimedia — MSYS2's current OIIO has ABI drift vs
      # notcurses 3.0.17's oiio.cpp, and the ffmpeg path is the same
      # mature one used on Linux/macOS.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain

      # zef's fallback extractors (tar, unzip) fail on Windows when
      # handling the mixed-separator temp paths it generates
      # (`D:\...\tmp/.zef...`) — Notcurses::Native's tarball never
      # unpacks. Sidestep by fetching + installing it from source
      # first; when Selkie's deps-only resolver then runs, it sees
      # Notcurses::Native already satisfied and skips the download.
      # Also means Windows CI tests Selkie against head-of-main
      # Notcurses::Native rather than whatever's published.
      - name: Install Notcurses::Native from source
        run: |
          cd ..
          git clone --depth=1 https://github.com/m-doughty/Notcurses-Native.git
          cd Notcurses-Native
          zef install --/test .

      - name: Install remaining Raku dependencies
        run: zef install --/test --test-depends --deps-only .

      # Notcurses's own test harness doesn't run on Windows (upstream
      # limitation — notcurses-tester is Unix-only). Selkie tests that
      # touch notcurses fail under MSYS2 for related reasons. For now
      # the Windows job verifies the module installs and loads; Linux
      # and macOS are the test-run matrix.
      - name: Verify install
        run: zef install --/test .
